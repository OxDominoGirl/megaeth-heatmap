name: Update Contract Deployments
on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Fetch Dune query results
        run: |
          # Fetch latest cached results directly (no re-execution needed)
          RESULTS=$(curl -s \
            "https://api.dune.com/api/v1/query/6883877/results" \
            -H "X-Dune-Api-Key: ${{ secrets.DUNE_API_KEY }}")

          echo "Row count check:"
          echo $RESULTS | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          rows = data.get('result', {}).get('rows', [])
          print(f'  rows found: {len(rows)}')
          if rows: print(f'  first row keys: {list(rows[0].keys())}')
          "

          # Write JSON with metadata
          echo $RESULTS | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          rows = data.get('result', {}).get('rows', [])
          output = {
            'updated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
            'total_contracts': len(rows),
            'query_id': 6883877,
            'data': rows
          }
          with open('contract-deployments.json', 'w') as f:
            json.dump(output, f)
          print(f'Wrote {len(rows)} contract deployments')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contract-deployments.json
          git diff --cached --quiet || (git commit -m "Update contract deployments data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
